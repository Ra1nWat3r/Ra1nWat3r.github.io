services:
  jekyll:
    build: .
    ports:
      # going to be reverse proxied
      - "127.0.0.1:4000:4000"
    volumes:
      # Source code read-only
      - ./aboutme.md:/app/aboutme.md:ro,z
      - ./index.html:/app/index.html:ro,z
      - ./feed.xml:/app/feed.xml:ro,z
      - ./tags.html:/app/tags.html:ro,z
      - ./404.html:/app/404.html:ro,z
      - ./_layouts:/app/_layouts:ro,z
      - ./_includes:/app/_includes:ro,z
      - ./_posts:/app/_posts:ro,z
      - ./_data:/app/_data:ro,z
      - ./_config.yml:/app/_config.yml:ro,z
      - ./assets:/app/assets:ro,z
      # Write-allowed directories (required for Jekyll)
      - ./_site:/app/_site:z
      - ./.jekyll-cache:/app/.jekyll-cache:z
    environment:
      - JEKYLL_ENV=production
    command: jekyll serve --host 0.0.0.0 --no-watch --disable-disk-cache
    restart: always